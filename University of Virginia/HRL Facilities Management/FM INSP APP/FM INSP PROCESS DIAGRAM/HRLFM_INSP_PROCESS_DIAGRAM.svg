<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B5E3C"/>
      <stop offset="100%" stop-color="#C4956A"/>
    </linearGradient>
    <linearGradient id="appGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a4a"/>
      <stop offset="100%" stop-color="#0d1f2d"/>
    </linearGradient>
    <linearGradient id="dbGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1a3a"/>
      <stop offset="100%" stop-color="#1a0d2d"/>
    </linearGradient>
    <linearGradient id="spGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2a1a"/>
      <stop offset="100%" stop-color="#2d1a0d"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#C4956A"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a9aba"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9a6aba"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="720" fill="#0a0a0f" rx="8"/>

  <!-- Title Bar -->
  <rect x="0" y="0" width="1100" height="50" fill="url(#headerGrad)" rx="8"/>
  <rect x="0" y="25" width="1100" height="25" fill="url(#headerGrad)"/>
  <text x="550" y="33" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold" letter-spacing="2">HRL FM INSPECTION APP — PROCESS FLOW DIAGRAM</text>

  <!-- Legend -->
  <rect x="30" y="65" width="18" height="18" rx="3" fill="#1a3a4a" stroke="#4a9aba" stroke-width="1.5"/>
  <text x="55" y="79" fill="#aaa" font-size="11">Canvas App (User Action)</text>
  <rect x="240" y="65" width="18" height="18" rx="9" fill="#2a1a3a" stroke="#9a6aba" stroke-width="1.5"/>
  <text x="265" y="79" fill="#aaa" font-size="11">SQL Server Database</text>
  <rect x="450" y="65" width="18" height="18" rx="3" fill="#3a2a1a" stroke="#C4956A" stroke-width="1.5"/>
  <text x="475" y="79" fill="#aaa" font-size="11">Stored Procedure</text>
  <line x1="660" y1="74" x2="710" y2="74" stroke="#C4956A" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="720" y="79" fill="#aaa" font-size="11">Data Flow</text>

  <!-- STEP 1: Login -->
  <rect x="30" y="105" width="220" height="70" rx="6" fill="url(#appGrad)" stroke="#4a9aba" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="140" y="130" text-anchor="middle" fill="#4a9aba" font-size="10" font-weight="bold" letter-spacing="1">STEP 1</text>
  <text x="140" y="148" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">Office 365 Login</text>
  <text x="140" y="165" text-anchor="middle" fill="#aaa" font-size="10">Grab CompID, FullName, Dept</text>

  <!-- Arrow 1→2 -->
  <line x1="250" y1="140" x2="300" y2="140" stroke="#C4956A" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- STEP 2: Patch OfficeAppTble -->
  <rect x="305" y="105" width="220" height="70" rx="12" fill="url(#dbGrad)" stroke="#9a6aba" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="415" y="130" text-anchor="middle" fill="#9a6aba" font-size="10" font-weight="bold" letter-spacing="1">PATCH</text>
  <text x="415" y="148" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">OfficeAppTble</text>
  <text x="415" y="165" text-anchor="middle" fill="#aaa" font-size="10">New PK ID + Timestamp</text>

  <!-- Arrow 2→SP1 -->
  <line x1="525" y1="140" x2="575" y2="140" stroke="#C4956A" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- SP: Insert OfficeTableID -->
  <rect x="580" y="105" width="240" height="70" rx="6" fill="url(#spGrad)" stroke="#C4956A" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="700" y="128" text-anchor="middle" fill="#C4956A" font-size="10" font-weight="bold" letter-spacing="1">STORED PROCEDURE</text>
  <text x="700" y="146" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">@@Identity → Insert</text>
  <text x="700" y="163" text-anchor="middle" fill="#aaa" font-size="10">OfficeTableID → Inspection FK</text>

  <!-- Arrow SP→Inspection Table -->
  <line x1="820" y1="140" x2="870" y2="140" stroke="#C4956A" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Inspection Table (central) -->
  <rect x="875" y="95" width="200" height="90" rx="12" fill="#1a0a2a" stroke="#d4a06a" stroke-width="2" filter="url(#shadow)"/>
  <text x="975" y="120" text-anchor="middle" fill="#d4a06a" font-size="10" font-weight="bold" letter-spacing="2">CENTRAL TABLE</text>
  <text x="975" y="140" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">Inspection</text>
  <text x="975" y="158" text-anchor="middle" fill="#aaa" font-size="10">InspID (Auto-Increment)</text>
  <text x="975" y="173" text-anchor="middle" fill="#aaa" font-size="10">Timestamp + All FKs</text>

  <!-- STEP 3: StarRez Lookup -->
  <rect x="30" y="220" width="220" height="70" rx="6" fill="url(#appGrad)" stroke="#4a9aba" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="140" y="245" text-anchor="middle" fill="#4a9aba" font-size="10" font-weight="bold" letter-spacing="1">STEP 2</text>
  <text x="140" y="263" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">Select Building/Room</text>
  <text x="140" y="280" text-anchor="middle" fill="#aaa" font-size="10">StarRezLookUp → content_id</text>

  <!-- Arrow 3→DB -->
  <line x1="250" y1="255" x2="300" y2="255" stroke="#4a9aba" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- DB: Patch content_id -->
  <rect x="305" y="220" width="220" height="70" rx="12" fill="url(#dbGrad)" stroke="#9a6aba" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="415" y="245" text-anchor="middle" fill="#9a6aba" font-size="10" font-weight="bold" letter-spacing="1">PATCH</text>
  <text x="415" y="263" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">StarRezBldg Table</text>
  <text x="415" y="280" text-anchor="middle" fill="#aaa" font-size="10">content_id → FK</text>

  <!-- Arrow to Inspection -->
  <line x1="525" y1="255" x2="975" y2="185" stroke="#9a6aba" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowPurple)"/>

  <!-- STEP 4: ReasonType -->
  <rect x="30" y="330" width="220" height="70" rx="6" fill="url(#appGrad)" stroke="#4a9aba" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="140" y="355" text-anchor="middle" fill="#4a9aba" font-size="10" font-weight="bold" letter-spacing="1">STEP 3</text>
  <text x="140" y="373" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">Select Reason Type</text>
  <text x="140" y="390" text-anchor="middle" fill="#aaa" font-size="10">InspReasonID</text>

  <!-- Arrow 4→DB -->
  <line x1="250" y1="365" x2="300" y2="365" stroke="#4a9aba" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- DB: Patch ReasonType -->
  <rect x="305" y="330" width="220" height="70" rx="12" fill="url(#dbGrad)" stroke="#9a6aba" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="415" y="355" text-anchor="middle" fill="#9a6aba" font-size="10" font-weight="bold" letter-spacing="1">STORED PROCEDURE</text>
  <text x="415" y="373" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">Insert InspReasonID</text>
  <text x="415" y="390" text-anchor="middle" fill="#aaa" font-size="10">FK → Inspection Table</text>

  <!-- Arrow to Inspection -->
  <line x1="525" y1="365" x2="875" y2="185" stroke="#9a6aba" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowPurple)"/>

  <!-- STEP 5: Living Area -->
  <rect x="30" y="440" width="220" height="70" rx="6" fill="url(#appGrad)" stroke="#4a9aba" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="140" y="465" text-anchor="middle" fill="#4a9aba" font-size="10" font-weight="bold" letter-spacing="1">STEP 4</text>
  <text x="140" y="483" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">Select Living Area</text>
  <text x="140" y="500" text-anchor="middle" fill="#aaa" font-size="10">LivAreaID → Form Mode Logic</text>

  <!-- Arrow 5→DB -->
  <line x1="250" y1="475" x2="300" y2="475" stroke="#4a9aba" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- DB: InspectByLivingArea -->
  <rect x="305" y="440" width="220" height="70" rx="12" fill="url(#dbGrad)" stroke="#9a6aba" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="415" y="465" text-anchor="middle" fill="#9a6aba" font-size="10" font-weight="bold" letter-spacing="1">PATCH</text>
  <text x="415" y="483" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">InspectByLivingArea</text>
  <text x="415" y="500" text-anchor="middle" fill="#aaa" font-size="10">LivAreaID → FK</text>

  <!-- Arrow to Inspection -->
  <line x1="525" y1="475" x2="875" y2="185" stroke="#9a6aba" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowPurple)"/>

  <!-- STEP 6: Inspection Forms (branching) -->
  <rect x="580" y="330" width="240" height="180" rx="6" fill="url(#appGrad)" stroke="#4a9aba" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="700" y="355" text-anchor="middle" fill="#4a9aba" font-size="10" font-weight="bold" letter-spacing="1">STEP 5 — INSPECTION FORMS</text>
  <text x="700" y="378" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">Dynamic Form Routing</text>

  <!-- Sub-items -->
  <rect x="600" y="393" width="200" height="24" rx="4" fill="#0d2030" stroke="#3a6a8a" stroke-width="1"/>
  <text x="700" y="410" text-anchor="middle" fill="#8abada" font-size="11">🛋 Furniture  (LivArea 2,5-9)</text>

  <rect x="600" y="423" width="200" height="24" rx="4" fill="#0d2030" stroke="#3a6a8a" stroke-width="1"/>
  <text x="700" y="440" text-anchor="middle" fill="#8abada" font-size="11">🍳 Kitchen  (LivArea 3)</text>

  <rect x="600" y="453" width="200" height="24" rx="4" fill="#0d2030" stroke="#3a6a8a" stroke-width="1"/>
  <text x="700" y="470" text-anchor="middle" fill="#8abada" font-size="11">🚿 Bathroom  (LivArea 4)</text>

  <rect x="600" y="483" width="200" height="24" rx="4" fill="#0d2030" stroke="#3a6a8a" stroke-width="1"/>
  <text x="700" y="500" text-anchor="middle" fill="#8abada" font-size="11">📐 Floor / Room Condition</text>

  <!-- Arrow from LivArea to Forms -->
  <line x1="525" y1="475" x2="580" y2="420" stroke="#4a9aba" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- STEP 7: Patch to specific tables -->
  <rect x="875" y="330" width="200" height="180" rx="12" fill="url(#dbGrad)" stroke="#9a6aba" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="975" y="355" text-anchor="middle" fill="#9a6aba" font-size="10" font-weight="bold" letter-spacing="1">DATABASE TABLES</text>
  
  <text x="975" y="378" text-anchor="middle" fill="#ccc" font-size="11">insp.Furniture</text>
  <text x="975" y="398" text-anchor="middle" fill="#ccc" font-size="11">insp.Kitchen</text>
  <text x="975" y="418" text-anchor="middle" fill="#ccc" font-size="11">insp.Bathroom / BathShower</text>
  <text x="975" y="438" text-anchor="middle" fill="#ccc" font-size="11">insp.BathTub</text>
  <text x="975" y="458" text-anchor="middle" fill="#ccc" font-size="11">insp.Floor</text>
  <text x="975" y="478" text-anchor="middle" fill="#ccc" font-size="11">insp.LivingAreaRoomCond</text>
  <text x="975" y="498" text-anchor="middle" fill="#ccc" font-size="11">insp.InspPhoto</text>

  <!-- Arrow Forms→DB Tables -->
  <line x1="820" y1="420" x2="875" y2="420" stroke="#C4956A" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Collection Caching Note -->
  <rect x="30" y="560" width="510" height="80" rx="6" fill="#111118" stroke="#333" stroke-width="1"/>
  <text x="285" y="585" text-anchor="middle" fill="#C4956A" font-size="11" font-weight="bold" letter-spacing="1">PERFORMANCE PATTERN — COLLECTION CACHING</text>
  <text x="285" y="605" text-anchor="middle" fill="#aaa" font-size="11">ClearCollect() loads table schemas on OnStart → local collections</text>
  <text x="285" y="625" text-anchor="middle" fill="#aaa" font-size="11">"Same Floor Throughout" logic reduces redundant DB calls across rooms</text>

  <!-- Stored Procedure Note -->
  <rect x="560" y="560" width="510" height="80" rx="6" fill="#111118" stroke="#333" stroke-width="1"/>
  <text x="815" y="585" text-anchor="middle" fill="#C4956A" font-size="11" font-weight="bold" letter-spacing="1">KEY ARCHITECTURE — STORED PROCEDURES</text>
  <text x="815" y="605" text-anchor="middle" fill="#aaa" font-size="11">@@Identity propagates PKs as FKs across related tables</text>
  <text x="815" y="625" text-anchor="middle" fill="#aaa" font-size="11">Each form Patch triggers SP chain → maintains referential integrity</text>

  <!-- Version -->
  <text x="550" y="710" text-anchor="middle" fill="#444" font-size="10">HRL FM Inspection App Process Diagram v1.1 — Mike Cvetanovich</text>
</svg>
